<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capsule Club Style Quiz v2</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to the Capsule Club Style Quiz v2</h1>
    <form id="quiz-form">
        <label for="question1">What is your favorite color?</label>
        <select id="question1" name="question1">
            <option value="red">Red</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="yellow">Yellow</option>
        </select>
        <label for="question2">Which style do you prefer?</label>
        <input type="radio" id="style1" name="question2" value="casual">
        <label for="style1">Casual</label><br>
        <input type="radio" id="style2" name="question2" value="formal">
        <label for="style2">Formal</label><br>
        <input type="radio" id="style3" name="question2" value="sporty">
        <label for="style3">Sporty</label><br>
        <input type="submit" value="Submit">
    </form>
    <script src="script.js"></script>
</body>
</html>
